            <div>welcome <span id="acct-username">username</span></div>

        <div class="acct-hd">
            <div class="acct-fd">
                <h4>Manage My Account</h4>
                <div class="acct-details">
                    <p><a href="">My profile</a></p>
                    <p><a href="">Address Book</a></p>
                    <p><a href="">My Payment Options</a></p>
                </div>
                <h4>My Orders</h4>

            <div class="edit-profile">
                <h3>Edit Your Profile</h3>
                   <div class="info-form">
                        <div class="info-flex">
                            <div class="str-flex" id="info-input" >
                                <label for="First Name">First Name</label>
                                <input type="text"  placeholder="Md" required>
                                <label for="Email">Email</label>
                                <input type="Email" placeholder="rimel1111@gmail.com" required>
                            </div>
                            <div class="str-flex" id="info-input">
                                <label for="Last Name">Last Name</label>
                                <input type="text" placeholder="Rimel" required>
                                <label for="First Name">Address</label>
                                <input type="Address" placeholder="Kingston, 5236, United State" required>
                            </div>
                        </div>

                        <div class="str-flex">
                             <label for="First Name">Password Changes</label>
                            <input type="text" placeholder="Current Passwod" required>
                            <input type="text" placeholder="New Passwod" required>
                            <input type="text" placeholder="Confirm New Passwod" required>
                        </div>
                   </div>

                   <div class="info-processing">
                    <a href="">cancel</a>
                    <button type="submit" class="colored-btn">Save Changes</button>
                   </div>

            </div>

        </div>
