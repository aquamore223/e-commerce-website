     <header id="header">

    <div class="cart-main">
        <div id="disp-hd" ><a href="">Home </a>  /<a href=""> Cart</a></div>
    
        <div class="table">
            <div class="cart-flex"> 
                <h4>product</h4>
                <h4>Price</h4>

            </div>
            <div class="cart-flex">
                <div id="cart-pic-section">
                    <img src="/images/g27cq4-500x500 1.png" alt=""> <p>LCD Monitor</p>
                </div>
                <p>$850</p>
                <input type="number" min="1" >
                <p>$850</p>
            </div>
             <div class="cart-flex">

                </div>
                <p>$850</p>

            </div>
            <div class="pg-flex-sb">

                <div class="receipt-fmt">

                    <div class="undl-fl">

                    <div class="undl-fl">

                        <p>Free</p>
                    </div>

                    </div>
                    <a href="/order&payment/checkout.html"><button class="gen-btn">Procees to checkout</button></a>
